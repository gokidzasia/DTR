<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DTR QR Scanner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="scanner-panel">
        <div class="topbar">
          <div class="brand-title">
            <img class="brand-logo" src="static-logo.png" alt="Organization logo" />
            <div>
            <p class="eyebrow">Daily Time Record</p>
            <h1>QR Scanner</h1>
            </div>
          </div>
          <div class="clock" id="clock">--:--:--</div>
        </div>

        <div class="camera-stage">
          <video id="video" playsinline muted></video>
          <canvas id="snapshotCanvas" hidden></canvas>
          <div class="scan-frame" aria-hidden="true"></div>
          <div class="camera-status" id="cameraStatus">Starting camera...</div>
        </div>

        <div class="camera-tools">
          <label>
            Camera source
            <select id="cameraSelect">
              <option value="">Default camera</option>
            </select>
          </label>
          <label class="check-control">
            <input id="autoStartCamera" type="checkbox" />
            Auto-start scanner
          </label>
          <button id="refreshCamerasButton" type="button">Refresh Cameras</button>
        </div>

        <div class="controls">
          <button id="startButton" type="button">Start Camera</button>
          <button id="stopButton" type="button">Stop</button>
          <button id="exportButton" type="button">Export CSV</button>
          <a class="button-link" href="qr-generator.html">Generate QR</a>
          <a class="button-link" href="dashboard.html">Dashboard</a>
          <a class="button-link" href="admin.html">Staff Admin</a>
        </div>

        <form class="manual-scan" id="manualScanForm">
          <label>
            Manual staff ID
            <input id="manualCode" name="manualCode" type="text" placeholder="Use only if QR scanning is unavailable" />
          </label>
          <button id="manualButton" type="button">Record Manual Scan</button>
        </form>
      </section>

      <aside class="activity-panel">
        <div class="summary">
          <span id="scanCount">0</span>
          <p>records today</p>
        </div>

        <div class="last-scan" id="lastScan">
          <p class="muted">Waiting for first scan</p>
        </div>

        <h2>Recent Records</h2>
        <div class="records" id="records"></div>
      </aside>
    </main>

    <dialog class="photo-dialog" id="photoDialog">
      <button class="dialog-close" id="closePhotoDialog" type="button">Close</button>
      <img id="photoDialogImage" alt="Attendance evidence preview" />
    </dialog>

    <script src="vendor/jsQR.js"></script>
    <script src="app.js"></script>
  </body>
</html>
