<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DTR Staff Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="scanner-panel">
        <div class="topbar">
          <div class="brand-title">
            <img class="brand-logo" src="static-logo.png" alt="Organization logo" />
            <div>
              <p class="eyebrow">Daily Time Record</p>
              <h1>Staff Admin</h1>
            </div>
          </div>
          <a class="button-link" href="index.html">Scanner</a>
        </div>

        <nav class="admin-tabs" aria-label="Admin navigation">
          <button class="admin-tab active" data-admin-tab="staff" type="button">Staff Management</button>
          <button class="admin-tab" data-admin-tab="external" type="button">External Link</button>
        </nav>

        <section class="admin-section active" id="staffSection">
          <form class="admin-form" id="employeeForm">
            <label>
              Employee ID Code
              <input id="employeeId" type="text" placeholder="EMP-00123" required />
            </label>
            <label>
              Employee Name
              <input id="employeeName" type="text" placeholder="John Doe" required />
            </label>
            <label>
              Email Address
              <input id="employeeEmail" type="email" placeholder="john@example.com" />
            </label>
            <label>
              Branch / Site
              <input id="employeeBranch" type="text" placeholder="Kantibas, Cebu" />
            </label>
            <label>
              Role
              <select id="employeeRole">
                <option value="staff">Staff</option>
                <option value="viewer">Viewer</option>
                <option value="admin">Admin</option>
              </select>
            </label>
            <label>
              Profile Photo
              <input id="employeePhoto" type="file" accept="image/*" />
            </label>
            <label class="check-control">
              <input id="employeeActive" type="checkbox" checked />
              Active staff
            </label>
            <button type="submit">Save Staff</button>
          </form>

          <div class="controls">
            <button id="refreshEmployees" type="button">Refresh Staff</button>
            <button id="clearEmployeeForm" type="button">Clear Form</button>
          </div>

          <div class="employee-grid" id="employeeGrid"></div>
        </section>

        <section class="admin-section" id="externalSection">
          <form class="admin-form" id="externalSettingsForm">
            <label>
              Google Apps Script upload URL
              <input id="uploadUrl" name="uploadUrl" type="url" placeholder="https://script.google.com/macros/s/..." />
            </label>
            <label>
              Supabase URL
              <input id="supabaseUrl" name="supabaseUrl" type="url" placeholder="https://project.supabase.co" />
            </label>
            <label>
              Supabase anon key
              <input id="supabaseKey" name="supabaseKey" type="password" placeholder="Paste anon public key" />
            </label>
            <label>
              Storage bucket
              <input id="supabaseBucket" name="supabaseBucket" type="text" placeholder="attendance-evidence" />
            </label>
            <label>
              Branch / Site Location
              <input id="branchSite" name="branchSite" type="text" placeholder="Kantibas, Cebu" />
            </label>
            <label>
              Email Edge Function URL
              <input id="emailFunctionUrl" name="emailFunctionUrl" type="url" placeholder="https://project.functions.supabase.co/send-attendance-email" />
            </label>
            <button type="submit">Save External Links</button>
          </form>
        </section>

        <div class="admin-status" id="adminStatus">Use External Link to save Supabase and Google Sheets settings.</div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
